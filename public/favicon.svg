<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Hintergrund -->
  <rect width="32" height="32" rx="8" fill="#111827"/>
  <!-- Uhr-Kreis -->
  <circle cx="16" cy="17" r="10" stroke="#00BCD4" stroke-width="2"/>
  <!-- Stundenzeiger -->
  <line x1="16" y1="17" x2="16" y2="10" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <!-- Minutenzeiger -->
  <line x1="16" y1="17" x2="21" y2="17" stroke="#F9FAFB" stroke-width="2" stroke-linecap="round"/>
  <!-- Mittelpunkt -->
  <circle cx="16" cy="17" r="1.5" fill="#00BCD4"/>
  <!-- Aufzieher oben -->
  <rect x="13" y="4" width="6" height="2.5" rx="1.25" fill="#00BCD4"/>
</svg>
