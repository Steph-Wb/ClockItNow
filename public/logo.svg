<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Hintergrund -->
  <rect width="40" height="40" rx="10" fill="#1f2937"/>
  <!-- Uhr-Kreis -->
  <circle cx="20" cy="22" r="13" stroke="#00BCD4" stroke-width="2.5"/>
  <!-- Stundenzeiger -->
  <line x1="20" y1="22" x2="20" y2="13" stroke="#00BCD4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minutenzeiger -->
  <line x1="20" y1="22" x2="27" y2="22" stroke="#F9FAFB" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mittelpunkt -->
  <circle cx="20" cy="22" r="2" fill="#00BCD4"/>
  <!-- Aufzieher oben -->
  <rect x="16" y="5" width="8" height="3" rx="1.5" fill="#00BCD4"/>
</svg>
