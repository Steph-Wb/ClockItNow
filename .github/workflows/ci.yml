name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck client
        run: npx tsc -p tsconfig.json --noEmit

      # npm run build = tsc -p tsconfig.node.json (Server) && vite build (Client)
      - name: Build (server typecheck + client bundle)
        run: npm run build
